name: Feature request
description: Suggest a new capability for CanonKit.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What author workflow is blocked or painful today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the ideal behavior or UX.
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Product area
      options:
        - Story bible
        - Continuity rules
        - AI context pack
        - Import/export
        - Collaboration workflow
        - Developer tooling
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
